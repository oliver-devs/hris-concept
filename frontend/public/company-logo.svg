<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
        <linearGradient id="prismaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2563eb" />
            <stop offset="100%" stop-color="#06b6d4" />
        </linearGradient>
    </defs>
    <!-- Prisma-Form: stilisiertes Dreieck/Prisma mit Lichtbrechung -->
    <polygon points="50,10 85,80 15,80" fill="none" stroke="url(#prismaGrad)" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Lichtstrahl der durch das Prisma geht -->
    <line x1="10" y1="45" x2="42" y2="45" stroke="url(#prismaGrad)" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    <!-- Gebrochenes Licht (Spectrum) -->
    <line x1="62" y1="38" x2="90" y2="28" stroke="#6366f1" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="64" y1="45" x2="92" y2="45" stroke="#06b6d4" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="62" y1="52" x2="90" y2="62" stroke="#10b981" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
</svg>