<section class="container">
    <header class="header">
        <h1>Abteilungen</h1>
        <p>Verwalte hier die Abteilungen deines Unternehmens.</p>

        <button mat-flat-button color="primary" class="add-btn" (click)="openForm()">
            <mat-icon>add</mat-icon> Neue Abteilung
        </button>
    </header>

    <div class="grid">
        @for (dept of departments(); track dept.id) {
            <mat-card class="dept-card appearance-outlined">
                <mat-card-header>
                    <div mat-card-avatar class="avatar-icon">
                        <mat-icon>domain</mat-icon>
                    </div>
                    <mat-card-title>{{ dept.name }}</mat-card-title>
                    <mat-card-subtitle>{{ dept.employee_count }} Mitarbeiter</mat-card-subtitle>
                </mat-card-header>

                <mat-card-content class="content">
                    <p class="description">
                        {{ dept.description || 'Keine Beschreibung hinterlegt.' }}
                    </p>
                </mat-card-content>

                <mat-card-actions align="end" class="actions">
                    <button mat-button color="primary" (click)="openForm(dept)">Bearbeiten</button>

                    <div
                        [matTooltip]="
                            (dept.employee_count || 0) > 0
                                ? 'Nicht leer! Erst Mitarbeiter verschieben.'
                                : 'Löschen'
                        "
                    >
                        <button
                            mat-button
                            color="warn"
                            (click)="deleteDept(dept)"
                            [disabled]="(dept.employee_count || 0) > 0"
                        >
                            Löschen
                        </button>
                    </div>
                </mat-card-actions>
            </mat-card>
        } @empty {
            <div class="empty-state">
                <mat-icon>domain_disabled</mat-icon>
                <p>Keine Abteilungen gefunden.</p>
            </div>
        }
    </div>
</section>
