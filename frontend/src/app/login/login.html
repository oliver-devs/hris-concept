<section class="login-container">
    <header class="login-branding">
        <mat-icon class="login-logo">admin_panel_settings</mat-icon>
        <h1 class="login-app-name">HRSys</h1>
        <p class="login-tagline">Mitarbeiter-Verwaltung</p>
    </header>

    <mat-card class="login-card">
        <mat-card-content>
            <h2 class="login-title">Anmelden</h2>

            <form (ngSubmit)="onLogin()" class="login-form">
                <mat-form-field appearance="outline">
                    <mat-label>Benutzername</mat-label>
                    <mat-icon matPrefix>person</mat-icon>
                    <input matInput [(ngModel)]="username" name="username" required />
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label>Passwort</mat-label>
                    <mat-icon matPrefix>lock</mat-icon>
                    <input
                        matInput
                        [(ngModel)]="password"
                        name="password"
                        type="password"
                        required
                    />
                </mat-form-field>

                <button
                    mat-flat-button
                    color="primary"
                    type="submit"
                    class="login-button"
                    [disabled]="!username || !password || isLoading()"
                >
                    @if (isLoading()) {
                        Wird angemeldet...
                    } @else {
                        Anmelden
                    }
                </button>
            </form>
        </mat-card-content>
    </mat-card>

    <footer class="login-footer">&copy; 2025 HRSys</footer>
</section>
